site_name: Skaal
site_description: Infrastructure as Constraints for Python.
site_url: https://elouen-ginat.github.io/Skaal/
repo_url: https://github.com/Elouen-ginat/Skaal
repo_name: Elouen-ginat/Skaal
edit_uri: edit/main/docs/

theme:
  name: material
  logo: design_system/logo_variants/it-dot.svg
  favicon: design_system/favicon.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: sphinx
            inherited_members: true
            merge_init_into_class: true
            members_order: source
            parameter_headings: true
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

exclude_docs: |
  backend_unification.md
  dispatch_refactor.md
  engine_dispatch.md
  new_storage.md
  runtime_audit.md
  user_gaps.md
  what_is_needed_for_prod.md
  design/002-z3-backend-selection.md
  design/003-catalog-toml-format.md
  design/004-six-stage-migration.md
  design/005-local-runtime-design.md
  design/006-rust-mesh-architecture.md
  design/007-schema-versioning.md
  design/008-local-pulumi-migration.md
  design/009-precompiled-mesh-wheels.md
  design/010-deploy-submodule-refactor.md
  design/011-deploy-submodule-implementation-plan.md
  design/012-pulumi-automation-and-docker-py-refactor.md
  design/013-logging-and-cli-verbosity.md
  design/014-http-routing-overhaul.md
  design/015-store-surface-implementation-plan.md
  design/016-blob-storage-tier-implementation-plan.md
  design/017-production-runtime-baseline-implementation-plan.md
  design/018-agent-persistence-implementation-plan.md
  design/019-simplification-report.md
  design/020-skaal-init-and-dev-implementation-plan.md
  design/021-solver-diagnostics-implementation-plan.md
  design/022-catalog-overrides-implementation-plan.md
  design/023-relational-migrations-implementation-plan.md
  design/024-secret-injection-implementation-plan.md
  design/025-per-row-ttl-implementation-plan.md
  design/026-background-jobs-implementation-plan.md
  design/027-backend-native-cursor-index-optimization-plan.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - design_system/tokens/skaal-tokens.css
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - Guides:
      - How It Works: how-it-works.md
      - Platform Features: platform-features.md
      - Examples: examples.md
      - CLI: cli.md
      - Catalogs: catalogs.md
      - HTTP Integration: http.md
  - Reference:
      - Python API: reference/python-api.md
      - Design System: design_system/README.md
      - Design Assets: design_system/ASSETS.md
  - Architecture:
      - Constraint Model: design/001-infrastructure-as-constraints.md

extra:
  homepage: https://github.com/Elouen-ginat/Skaal

copyright: Copyright &copy; 2026 Skaal contributors
