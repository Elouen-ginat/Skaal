site_name: Skaal
site_description: Code-first infrastructure for Python.
site_url: https://elouen-ginat.github.io/Skaal/
repo_url: https://github.com/Elouen-ginat/Skaal
repo_name: Elouen-ginat/Skaal
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/brand/app-icon.svg
  favicon: assets/brand/favicon.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            inherited_members: true
            merge_init_into_class: true
            members_order: source
            parameter_headings: false
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/skaal-tokens.css
  - assets/stylesheets/landing.css
  - assets/stylesheets/extra.css
  - assets/stylesheets/reference.css

nav:
  - Home: index.md
  - Get started: getting-started.md
  - Concepts: concepts.md
  - Tutorials:
      - Overview: tutorials/index.md
      - 1. Your first app: tutorials/first-app.md
      - 2. Adding HTTP routes: tutorials/http-api.md
      - 3. Deploying a simple AWS app: tutorials/planning-and-deployment.md
      - 3b. Deploying a simple GCP app: tutorials/gcp-deployment.md
      - 4. Relational data: tutorials/relational-and-migrations.md
      - 5. Files and Streaming: tutorials/files-and-streaming.md
  - Guides:
      - How it works: how-it-works.md
      - When to use Skaal: when-to-use.md
      - What you can build: platform-features.md
      - HTTP integration: http.md
      - FAQ: faq.md
  - Reference:
      - CLI:
          - Commands: cli.md
          - Configuration: cli-configuration.md
      - Python API:
          - Overview: reference/python-api.md
          - Core and Decorators: reference/python-api-core.md
          - Data Surfaces: reference/python-api-data.md
          - Components and Scheduling: reference/python-api-components.md
          - CLI-Parity API: reference/python-api-cli-parity.md
          - Types and Policies: reference/python-api-types.md
  - Comparison: comparison.md
  - What's new: whats-new.md
  - Examples: examples.md

