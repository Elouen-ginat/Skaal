<svg width="760" height="360" viewBox="0 0 760 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Skaal plan graph example</title>
  <rect width="760" height="360" rx="28" fill="#0F1828"/>
  <text x="36" y="44" fill="#FFFFFF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">Plan Graph (Example)</text>
