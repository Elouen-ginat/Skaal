<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240" fill="none">
  <foreignObject width="700" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
  <div>
    <div style="font-family:'IBM Plex Sans';font-size:18px;line-height:1.7;color:rgba(14,23,38,0.82);max-width:50ch;">Write Python. Skaal infers the architecture from your classes and functions, binds each primitive to a backend per environment, and generates the Pulumi program that makes it real.</div>
    <div class="value" style="margin-top:4px;">Lead · 18px · 1.7 · 82% ink</div>
  </div>
  <div>
    <div style="font-family:'IBM Plex Sans';font-size:16px;line-height:1.6;color:rgba(14,23,38,0.80);max-width:60ch;">Body copy stays neutral and highly readable across docs, source-to-resource maps, and CLI surfaces.</div>
    <div class="value" style="margin-top:4px;">Body · 16px · 1.6 · 80% ink</div>
  </div>
  <div>
    <span class="kicker" style="font-family:'IBM Plex Sans';font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:6px 10px;border:1px solid rgba(19,181,168,0.2);border-radius:999px;background:#fff;">Code-first infrastructure</span>
    <span class="value" style="margin-left:12px;">Kicker · 11–12px · UPPERCASE · 0.08em</span>
  </div>
  <div>
    <span style="font-family:'IBM Plex Mono';font-size:14px;background:#0F1828;color:#9AE66E;padding:4px 10px;border-radius:8px;">skaal plan --env prod</span>
    <span class="value" style="margin-left:12px;">Mono · 14px · used in code surfaces</span>
  </div>
</div>
    </div>
  </foreignObject>
</svg>
