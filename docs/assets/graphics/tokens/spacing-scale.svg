<svg xmlns="http://www.w3.org/2000/svg" width="700" height="190" viewBox="0 0 700 190" fill="none">
  <foreignObject width="700" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
  <div style="display:flex;align-items:flex-end;gap:18px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:4px;height:4px;background:#13B5A8;border-radius:2px;"></div><div class="value">4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:#13B5A8;border-radius:2px;"></div><div class="value">8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:#13B5A8;border-radius:2px;"></div><div class="value">12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:16px;height:16px;background:#13B5A8;border-radius:2px;"></div><div class="value">16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:20px;height:20px;background:#13B5A8;border-radius:2px;"></div><div class="value">20</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:24px;background:#13B5A8;border-radius:2px;"></div><div class="value">24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:32px;height:32px;background:#13B5A8;border-radius:2px;"></div><div class="value">32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:40px;height:40px;background:#13B5A8;border-radius:2px;"></div><div class="value">40</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:48px;height:48px;background:#13B5A8;border-radius:2px;"></div><div class="value">48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#13B5A8;border-radius:2px;"></div><div class="value">64</div></div>
  </div>
  <div class="label" style="margin-top:14px;">4px base · tokens space-1 → space-16</div>
</div>
    </div>
  </foreignObject>
</svg>
