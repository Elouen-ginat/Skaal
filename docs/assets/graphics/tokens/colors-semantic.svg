<svg xmlns="http://www.w3.org/2000/svg" width="700" height="230" viewBox="0 0 700 230" fill="none">
  <foreignObject width="700" height="230">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
  <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap:14px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#13B5A8;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Active / source→resource</div><div class="value">--skaal-color-signal-teal</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#9AE66E;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Bound / added</div><div class="value">--skaal-color-solver-green</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#5FA8FF;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Environment / info</div><div class="value">--skaal-color-cloud-blue</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#C96A3D;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Removed / drift</div><div class="value">--skaal-color-rust-copper</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#0E1726;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Foreground / text</div><div class="value">--fg-1, --skaal-color-ink</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#A7B4C2;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Border / divider</div><div class="value">--skaal-color-grid</div></div>
    </div>
  </div>
</div>
    </div>
  </foreignObject>
</svg>
