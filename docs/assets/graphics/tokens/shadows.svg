<svg xmlns="http://www.w3.org/2000/svg" width="700" height="210" viewBox="0 0 700 210" fill="none">
  <foreignObject width="700" height="210">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card" style="background:#F6FBF9;">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:8px;">
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.22);box-shadow:0 1px 2px rgba(14,23,38,0.04);"></div>
      <div class="label" style="margin-top:14px;">flat</div>
      <div class="value">0 1 2 / 4%</div>
    </div>
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.18);box-shadow:0 4px 12px rgba(14,23,38,0.05);"></div>
      <div class="label" style="margin-top:14px;">soft</div>
      <div class="value">0 4 12 / 5%</div>
    </div>
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.14);box-shadow:0 8px 18px rgba(14,23,38,0.06);"></div>
      <div class="label" style="margin-top:14px;">hover</div>
      <div class="value">0 8 18 / 6%</div>
    </div>
  </div>
</div>
    </div>
  </foreignObject>
</svg>
