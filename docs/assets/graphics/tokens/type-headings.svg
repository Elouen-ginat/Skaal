<svg xmlns="http://www.w3.org/2000/svg" width="700" height="250" viewBox="0 0 700 250" fill="none">
  <foreignObject width="700" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card" style="display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex;align-items:baseline;gap:14px;">
    <span style="font-family:'Space Grotesk';font-weight:700;font-size:64px;line-height:0.88;letter-spacing:-0.04em;">Just write Python.</span>
    <span class="value">Display · 64–88px · -0.04em · 0.88</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;">
    <span style="font-family:'Space Grotesk';font-weight:700;font-size:38px;line-height:0.94;letter-spacing:-0.04em;">The class is the table</span>
    <span class="value">H1 · 40–56px</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;">
    <span style="font-family:'Space Grotesk';font-weight:600;font-size:28px;line-height:1.12;letter-spacing:-0.03em;">How Skaal infers</span>
    <span class="value">H2 · 28–32px</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px;">
    <span style="font-family:'Space Grotesk';font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.02em;">Primitive declarations</span>
    <span class="value">H3 · 20px</span>
  </div>
</div>
    </div>
  </foreignObject>
</svg>
