<svg xmlns="http://www.w3.org/2000/svg" width="700" height="190" viewBox="0 0 700 190" fill="none">
  <foreignObject width="700" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
<style>
  .b { display:inline-block; padding: 6px 14px; border-radius: 999px; background: #fff; border: 1px solid var(--border-2); font: 500 13px 'IBM Plex Mono'; }
  .curve { width:120px; height:60px; }
</style>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">
  <div><div class="b">140ms</div><div class="label" style="margin-top:8px;">fast — chip / hover</div></div>
  <div><div class="b">180ms</div><div class="label" style="margin-top:8px;">base — card / panel</div></div>
  <div><div class="b">220ms</div><div class="label" style="margin-top:8px;">slow — surface change</div></div>
</div>
<div style="margin-top:18px;display:flex;align-items:center;gap:14px;">
  <svg class="curve" viewBox="0 0 120 60"><path d="M0 60 C 30 60, 30 0, 120 0" stroke="#13B5A8" stroke-width="2" fill="none"/></svg>
  <div><div style="font-family:'IBM Plex Mono';font-size:13px;color:#0E1726;">cubic-bezier(0.2, 0.8, 0.2, 1)</div><div class="label">standard ease — never floaty</div></div>
</div>
</div>
    </div>
  </foreignObject>
</svg>
