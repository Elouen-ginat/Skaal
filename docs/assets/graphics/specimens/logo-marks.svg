<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200" fill="none">
  <foreignObject width="700" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;border:1px solid var(--border-2);">
      <img src="../../brand/skaal-logo.svg" style="max-width:100%;max-height:56px;" alt="skaal logo" />
    </div>
    <div class="label" style="margin-top:8px;">skaal-logo</div>
  </div>
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;border:1px solid var(--border-2);">
      <img src="../../brand/app-icon.svg" style="max-height:64px;" alt="app icon" />
    </div>
    <div class="label" style="margin-top:8px;">app-icon</div>
  </div>
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#0E1726;border-radius:14px;">
      <img src="../../brand/favicon.svg" style="max-height:48px;" alt="favicon" />
    </div>
    <div class="label" style="margin-top:8px;">favicon</div>
  </div>
</div>
</div>
    </div>
  </foreignObject>
</svg>
