<svg xmlns="http://www.w3.org/2000/svg" width="700" height="140" viewBox="0 0 700 140" fill="none">
  <foreignObject width="700" height="140">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
<style>
  .sig { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px 6px 10px; border-radius: 999px; font: 600 12px/1 'IBM Plex Sans'; letter-spacing: 0.02em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .sig-resolved { background: rgba(154,230,110,0.18); color: #3f7d1c; }
  .sig-resolved .dot { background: #9AE66E; box-shadow: 0 0 0 3px rgba(154,230,110,0.25); }
  .sig-deploying { background: rgba(95,168,255,0.16); color: #1d6cc7; }
  .sig-deploying .dot { background: #5FA8FF; }
  .sig-pending { background: rgba(167,180,194,0.22); color: #4a5566; }
  .sig-pending .dot { background: #A7B4C2; }
  .sig-degraded { background: rgba(201,106,61,0.16); color: #A75529; }
  .sig-degraded .dot { background: #C96A3D; }
  .sig-error { background: rgba(231,76,60,0.14); color: #B92E1F; }
  .sig-error .dot { background: #E04F3C; }
</style>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
  <span class="sig sig-resolved"><span class="dot"></span>Bound</span>
  <span class="sig sig-deploying"><span class="dot"></span>Deploying</span>
  <span class="sig sig-pending"><span class="dot"></span>Pending</span>
  <span class="sig sig-degraded"><span class="dot"></span>Drift</span>
  <span class="sig sig-error"><span class="dot"></span>Error</span>
</div>
<div class="label" style="margin-top:14px;">Bound · Deploying · Pending · Drift · Error</div>
</div>
    </div>
  </foreignObject>
</svg>
