<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120" fill="none">
  <foreignObject width="700" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" class="asset-root">
      <style>@import url('../../stylesheets/colors_and_type.css');
.asset-root,
.asset-root *,
.asset-root *::before,
.asset-root *::after { box-sizing: border-box; }
.asset-root { font-family: var(--font-body); color: var(--fg-1); }
.asset-root .card {
  width: 700px;
  padding: 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--skaal-color-mist) 100%);
}
.asset-root .row { display: flex; gap: 12px; align-items: stretch; }
.asset-root .grid { display: grid; gap: 12px; }
.asset-root .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.asset-root .label.on-dark { color: var(--fg-on-dark-3); }
.asset-root .value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
}</style>
      <div class="card">
<style>
  .btn { font-family: 'IBM Plex Sans'; font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 999px; border: 1px solid transparent; cursor: pointer; transition: all 180ms cubic-bezier(0.2,0.8,0.2,1); }
  .btn-primary { background: linear-gradient(135deg, #0E1726, #1F3047); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(14,23,38,0.18); }
  .btn-secondary { background: rgba(255,255,255,0.9); color: #0E1726; border-color: rgba(167,180,194,0.4); }
  .btn-secondary:hover { background: #fff; border-color: #13B5A8; }
  .btn-accent { background: #13B5A8; color: #fff; }
  .btn-ghost { background: transparent; color: #0E1726; }
  .btn-ghost:hover { background: rgba(14,23,38,0.06); }
  .btn-danger { background: #fff; color: #C96A3D; border-color: rgba(201,106,61,0.4); }
</style>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
  <button class="btn btn-primary">Get Started</button>
  <button class="btn btn-accent">Deploy</button>
  <button class="btn btn-secondary">Browse API</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-danger">Roll back</button>
</div>
<div class="label" style="margin-top:14px;">primary · accent · secondary · ghost · danger</div>
</div>
    </div>
  </foreignObject>
</svg>
