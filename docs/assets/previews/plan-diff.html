<!doctype html>
<html><head><meta charset="utf-8"><title>Plan diff</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .diff { background:#fff; border:1px solid var(--border-1); border-radius:18px; overflow: hidden; }
  .diff-head { display:flex; justify-content:space-between; align-items:center; padding: 12px 18px; border-bottom: 1px solid var(--border-1); }
  .diff-title { font: 600 13px var(--font-heading); }
  .diff-summary { display:flex; gap: 10px; font: 600 11.5px 'IBM Plex Mono'; }
  .diff-summary .add { color:#4f9924; } .diff-summary .chg { color:#0F8E84; } .diff-summary .rem { color:#B05227; }
  .diff-body { padding: 6px 0; }
  .diff-row { display:grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items:center; padding: 7px 18px; font: 500 13px 'IBM Plex Mono'; }
  .diff-row.add { background: linear-gradient(90deg, rgba(154,230,110,0.12), transparent 60%); }
  .diff-row.chg { background: linear-gradient(90deg, rgba(19,181,168,0.10), transparent 60%); }
  .diff-row.rem { background: linear-gradient(90deg, rgba(201,106,61,0.10), transparent 60%); }
  .sigil { font: 700 14px 'IBM Plex Mono'; text-align:center; }
  .sigil.add { color:#4f9924; } .sigil.chg { color:#0F8E84; } .sigil.rem { color:#B05227; }
  .resource { color:#0E1726; }
  .resource .module { color: rgba(14,23,38,0.5); }
  .meta { font: 500 11px 'IBM Plex Mono'; color: rgba(14,23,38,0.55); }
  .meta .from { text-decoration: line-through; opacity: 0.6; }
  .meta .to { color: #0E1726; }
</style>
<div class="diff">
  <div class="diff-head">
    <div class="diff-title">skaal plan · env=prod · vs main</div>
    <div class="diff-summary"><span class="add">+2</span><span class="chg">~1</span><span class="rem">−1</span></div>
  </div>
  <div class="diff-body">
    <div class="diff-row add">
      <div class="sigil add">+</div>
      <div class="resource"><span class="module">acme.events:</span>SignupEvents</div>
      <div class="meta"><span class="to">→ sqs</span></div>
    </div>
    <div class="diff-row add">
      <div class="sigil add">+</div>
      <div class="resource"><span class="module">acme.signup:</span>signup</div>
      <div class="meta"><span class="to">→ lambda</span></div>
    </div>
    <div class="diff-row chg">
      <div class="sigil chg">~</div>
      <div class="resource"><span class="module">acme.users:</span>Users <span style="color:rgba(14,23,38,0.5);">· schema</span></div>
      <div class="meta"><span class="to">+ field email_verified</span></div>
    </div>
    <div class="diff-row rem">
      <div class="sigil rem">−</div>
      <div class="resource"><span class="module">acme.legacy:</span>OldSessions</div>
      <div class="meta"><span class="from">dynamodb</span></div>
    </div>
  </div>
</div>
</div></body></html>
