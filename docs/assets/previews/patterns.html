<!doctype html>
<html><head><meta charset="utf-8"><title>Patterns</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
  <div><div style="height:90px;border-radius:12px;background-image:url('../graphics/patterns/grid-light.svg');background-size:cover;border:1px solid var(--border-2);"></div><div class="label" style="margin-top:8px;">grid-light</div></div>
  <div><div style="height:90px;border-radius:12px;background-image:url('../graphics/patterns/grid-dots.svg');background-size:cover;border:1px solid var(--border-2);"></div><div class="label" style="margin-top:8px;">grid-dots</div></div>
  <div><div style="height:90px;border-radius:12px;background-image:url('../graphics/patterns/grid-dark.svg');background-size:cover;"></div><div class="label" style="margin-top:8px;">grid-dark</div></div>
  <div><div style="height:90px;border-radius:12px;background-image:url('../graphics/patterns/aurora-gradient.svg');background-size:cover;"></div><div class="label" style="margin-top:8px;">aurora</div></div>
</div>
</div></body></html>
