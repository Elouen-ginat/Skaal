<!doctype html>
<html><head><meta charset="utf-8"><title>Primitive declarations</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .pchip { display:inline-flex; align-items:center; gap:8px; margin: 0 8px 8px 0;
    padding: 6px 12px 6px 8px; border-radius: 12px;
    background:#fff; border: 1px solid rgba(167,180,194,0.45);
    font: 500 13px 'IBM Plex Mono', monospace; color:#0E1726;
    box-shadow: 0 1px 2px rgba(14,23,38,0.04); }
  .pchip .glyph { width:22px; height:22px; border-radius:6px; background:#F2F4F7;

  .pchip .kw { color:#5FA8FF; }
  .pchip .cls { color:#0E1726; font-weight:600; }
  .pchip .gen { color:rgba(14,23,38,0.55); }
  .pchip .pin { display:inline-flex; align-items:center; gap:4px;
    margin-left: 6px; padding: 2px 8px; border-radius: 999px;
    background: rgba(19,181,168,0.12); color: #0F8E84;
    font: 600 10.5px 'IBM Plex Sans'; letter-spacing: 0.03em; }
  .pchip .pin::before { content:""; width:5px; height:5px; border-radius:50%;
    background:#13B5A8; box-shadow: 0 0 0 2px rgba(19,181,168,0.25); }
</style>
<div style="display:flex;flex-wrap:wrap;">

  </span>
