<!doctype html>
<html><head><meta charset="utf-8"><title>Foreground tints</title><link rel="stylesheet" href="_card.css"></head>

      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">fg-1</div>

    </div>
    <div>
      <div style="height:60px;border-radius:14px;background:rgba(14,23,38,0.80);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;">Aa</div>

      <div class="value">80% — body</div>
    </div>
    <div>
      <div style="height:60px;border-radius:14px;background:rgba(14,23,38,0.62);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;">Aa</div>
      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">fg-3</div>

    </div>
    <div>
      <div style="height:60px;border-radius:14px;background:rgba(14,23,38,0.42);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;">Aa</div>
      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">fg-4</div>

    </div>
  </div>
</div></body></html>
