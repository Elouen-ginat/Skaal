<!doctype html>
<html><head><meta charset="utf-8"><title>Terminal block</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#F6FBF9;">
<style>
  .term { border-radius: 16px; background: linear-gradient(180deg,#10192B,#0F1828); box-shadow: 0 12px 28px rgba(14,23,38,0.18); padding: 14px 16px 16px; font: 500 13px/1.6 'IBM Plex Mono'; color: #E5F3F7; }
  .term .dots { display:flex; gap:6px; margin-bottom: 10px; }
  .term .dots i { width:10px; height:10px; border-radius:50%; background: #2a3854; }
  .term .dots i:first-child { background: #C96A3D; }
  .term .dots i:nth-child(2) { background: #d9b765; }
  .term .dots i:nth-child(3) { background: #9AE66E; }
  .term .p { color: #5FA8FF; }
  .term .ok { color: #9AE66E; }
  .term .muted { color: rgba(245,251,255,0.55); }
</style>
<div class="term">
  <div class="dots"><i></i><i></i><i></i></div>
  <div><span class="muted">$</span> <span>skaal plan --env prod</span></div>
  <div class="muted">› inferred 12 resources from acme.app:app</div>
  <div><span class="ok">+</span> acme.events:SignupEvents       → <span class="p">sqs</span></div>
  <div><span style="color:#13B5A8;">~</span> acme.users:Users               <span class="muted">schema: + email_verified</span></div>
  <div class="muted">✓ plan ready · 12 add · 1 change · 0 remove</div>
</div>
</div></body></html>
