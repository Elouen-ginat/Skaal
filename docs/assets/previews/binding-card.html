<!doctype html>
<html><head><meta charset="utf-8"><title>Binding card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .bind { border: 1px solid rgba(167,180,194,0.3); border-radius: 16px; background: #fff; padding: 16px 18px; }
  .bind-head { display:flex; justify-content:space-between; align-items:center; gap: 10px; }
  .src-wrap { display:flex; align-items:center; gap: 10px; min-width: 0; }
  .src-glyph { width: 28px; height: 28px; border-radius: 8px; background: #F2F4F7; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .src-typed { font: 500 14px 'IBM Plex Mono'; color: #0E1726; }
  .src-typed .gen { color: rgba(14,23,38,0.55); }
  .pin { display:inline-flex; align-items:center; gap:6px; font: 600 11px 'IBM Plex Sans'; padding: 3px 9px 3px 8px; background: rgba(19,181,168,0.12); color:#0F8E84; border-radius:999px; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink:0; }
  .pin::before { content:""; width:5px; height:5px; border-radius:50%; background:#13B5A8; box-shadow: 0 0 0 2px rgba(19,181,168,0.25); }
  .bridge { display:grid; grid-template-columns: 1fr 80px 1fr; align-items:center; margin-top: 14px; gap: 10px; }
  .col { display:flex; flex-direction:column; gap: 4px; }
  .colhead { font: 700 10px 'IBM Plex Sans'; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(14,23,38,0.50); }
  .colval { font: 500 12.5px 'IBM Plex Mono'; color: #0E1726; }
  .arrow svg { display:block; margin: 0 auto; }
  .footer { display:flex; gap: 14px; margin-top: 14px; padding-top: 12px; border-top: 1px dashed rgba(167,180,194,0.4); font: 500 11.5px 'IBM Plex Mono'; color: rgba(14,23,38,0.55); }
  .footer b { color: #0E1726; font-weight: 600; }
</style>
<div class="bind">
  <div class="bind-head">
    <div class="src-wrap">
      <span class="src-glyph">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="6" rx="7" ry="2.5" stroke="#0E1726" stroke-width="1.6"/><path d="M5 6v12c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5V6" stroke="#0E1726" stroke-width="1.6"/></svg>
      </span>
      <span class="src-typed"><span style="color:#5FA8FF;">class </span>Sales<span class="gen">(Table[BigQuery])</span></span>
    </div>
    <span class="pin">pinned</span>
  </div>

  <div class="bridge">
    <div class="col">
      <div class="colhead">Source</div>
      <div class="colval">acme/sales.py:9</div>
    </div>
    <div class="arrow">
      <svg width="80" height="14" viewBox="0 0 80 14" fill="none">
        <path d="M0 7 H 72" stroke="#13B5A8" stroke-width="1.5"/>
        <path d="M70 3 L 76 7 L 70 11" stroke="#13B5A8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="col">
      <div class="colhead">Bound to · env=prod</div>
      <div class="colval">acme-prod.warehouse.sales</div>
    </div>
  </div>

  <div class="footer">
    <span>env <b>prod</b></span>
    <span>region <b>eu-west-1</b></span>
    <span>locked <b>2026-05-12 14:00</b></span>
  </div>
</div>
</div></body></html>
