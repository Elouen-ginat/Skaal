<!doctype html>
<html><head><meta charset="utf-8"><title>Core palette</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div>
      <div style="height:96px;border-radius:14px;background:#0E1726;border:1px solid rgba(14,23,38,0.1);"></div>
      <div style="margin-top:10px;font-family:var(--font-heading);font-size:14px;font-weight:600;">Ink</div>
      <div class="value">#0E1726</div>
    </div>
    <div>
      <div style="height:96px;border-radius:14px;background:#F6FBF9;border:1px solid var(--border-2);"></div>
      <div style="margin-top:10px;font-family:var(--font-heading);font-size:14px;font-weight:600;">Mist</div>
      <div class="value">#F6FBF9</div>
    </div>
    <div>
      <div style="height:96px;border-radius:14px;background:#A7B4C2;border:1px solid rgba(14,23,38,0.06);"></div>
      <div style="margin-top:10px;font-family:var(--font-heading);font-size:14px;font-weight:600;">Grid</div>
      <div class="value">#A7B4C2</div>
    </div>
    <div>
      <div style="height:96px;border-radius:14px;background:#FFFFFF;border:1px solid var(--border-2);"></div>
      <div style="margin-top:10px;font-family:var(--font-heading);font-size:14px;font-weight:600;">Paper</div>
      <div class="value">#FFFFFF</div>
    </div>
  </div>
</div></body></html>
