<!doctype html>
<html><head><meta charset="utf-8"><title>Type families</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; gap:16px;">
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;letter-spacing:-0.04em;line-height:1;">Aa</div>
      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">Space Grotesk</div>
      <div class="value">Headings · 400/500/600/700</div>
    </div>
    <div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:600;letter-spacing:-0.02em;line-height:1;">Aa</div>
      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">IBM Plex Sans</div>
      <div class="value">Body · 400/500/600/700</div>
    </div>
    <div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:42px;font-weight:500;line-height:1;">Aa</div>
      <div style="margin-top:8px;font-family:var(--font-heading);font-size:13px;font-weight:600;">IBM Plex Mono</div>
      <div class="value">Code · 400/500/600</div>
    </div>
  </div>
</div></body></html>
