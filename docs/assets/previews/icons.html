<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .ic { width:48px; height:48px; border-radius:18px; background:#fff; border:1px solid var(--border-2); display:flex; align-items:center; justify-content:center; }
  .icrow { display:flex; gap:10px; flex-wrap:wrap; }
  .iccell { text-align:center; width: 64px; }
  .iccell .label { margin-top:6px; font-size: 10px; }
</style>

<div class="icrow">
  <!-- primitive -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <rect x="8" y="10" width="32" height="28" rx="4" stroke="#0E1726" stroke-width="2.4"/>
    <path d="M16 18h16M16 24h10" stroke="#0E1726" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M16 30h7" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">primitive</div></div>

  <!-- expose (was: function) -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <rect x="8" y="8" width="32" height="32" rx="8" stroke="#0E1726" stroke-width="2.4"/>
    <path d="M19 34 c0 -10 4 -20 11 -20 a3 3 0 0 1 3 3" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M16 24 h12" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">expose</div></div>

  <!-- store / table -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <rect x="8" y="10" width="32" height="28" rx="3" stroke="#0E1726" stroke-width="2.4"/>
    <path d="M8 18h32M20 18v20" stroke="#0E1726" stroke-width="2.4"/>
  </svg></div><div class="label">store</div></div>

  <!-- blob -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M24 8 l14 8 v16 l-14 8 l-14 -8 v-16 z" stroke="#0E1726" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M10 16 l14 8 l14 -8 M24 24 v16" stroke="#0E1726" stroke-width="2.4" stroke-linejoin="round"/>
  </svg></div><div class="label">blob</div></div>

  <!-- topic (was: channel) -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M8 14 h26 a6 6 0 0 1 6 6 v0 a6 6 0 0 1 -6 6 H14 l-6 6 z" stroke="#0E1726" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="20" cy="20" r="2" fill="#13B5A8"/>
    <circle cx="28" cy="20" r="2" fill="#13B5A8"/>
  </svg></div><div class="label">topic</div></div>

  <!-- table (was: relational) -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <ellipse cx="24" cy="12" rx="13" ry="4" stroke="#0E1726" stroke-width="2.2"/>
    <path d="M11 12 v6 c0 2.2 5.8 4 13 4 s13-1.8 13-4 v-6" stroke="#0E1726" stroke-width="2.2"/>
    <path d="M11 22 v6 c0 2.2 5.8 4 13 4 s13-1.8 13-4 v-6" stroke="#0E1726" stroke-width="2.2"/>
    <path d="M11 32 v4 c0 2.2 5.8 4 13 4 s13-1.8 13-4 v-4" stroke="#0E1726" stroke-width="2.2"/>
  </svg></div><div class="label">table</div></div>

  <!-- binding -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <rect x="6" y="18" width="14" height="12" rx="3" stroke="#0E1726" stroke-width="2.4"/>
    <rect x="28" y="18" width="14" height="12" rx="3" stroke="#0E1726" stroke-width="2.4" fill="#9AE66E" fill-opacity="0.18"/>
    <path d="M20 24 h8" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">binding</div></div>

  <!-- map -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M10 12 v24 l8 -4 l12 4 l8 -4 v-24 l-8 4 l-12 -4 z" stroke="#0E1726" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M18 8 v24 M30 12 v24" stroke="#0E1726" stroke-width="2.2" stroke-dasharray="2 3"/>
    <circle cx="34" cy="20" r="2.6" fill="#9AE66E"/>
  </svg></div><div class="label">map</div></div>

  <!-- diff -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M14 8 v32" stroke="#0E1726" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M22 14 h16 M22 24 h12 M22 34 h14" stroke="#0E1726" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M8 14 h6 M11 11 v6" stroke="#9AE66E" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M8 34 h6" stroke="#C96A3D" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">diff</div></div>

  <!-- pin -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M28 6 l14 14 l-6 2 l-10 10 l-4 -4 l-12 12 l-2 -2 l12 -12 l-4 -4 l10 -10 z" stroke="#0E1726" stroke-width="2.2" stroke-linejoin="round" fill="#fff"/>
    <circle cx="32" cy="16" r="3" fill="#13B5A8"/>
  </svg></div><div class="label">pin</div></div>

  <!-- mount -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M10 30 l8 -8 l6 6 l8 -10 l6 8" stroke="#0E1726" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="8" y="34" width="32" height="8" rx="2" stroke="#13B5A8" stroke-width="2.4"/>
    <path d="M16 38 h16" stroke="#13B5A8" stroke-width="2" stroke-linecap="round"/>
  </svg></div><div class="label">mount</div></div>

  <!-- schedule -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="14" stroke="#0E1726" stroke-width="2.4"/><path d="M24 16v8l5 5" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="label">schedule</div></div>

  <!-- environment -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <path d="M14 30 a8 8 0 0 1 0 -16 a10 10 0 0 1 19 2 a7 7 0 0 1 1 14 z" stroke="#0E1726" stroke-width="2.4"/>
    <path d="M18 36 h12" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">environment</div></div>

  <!-- deploy -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path d="M12 32l12-20 12 20" stroke="#0E1726" stroke-width="2.4" stroke-linejoin="round"/><circle cx="24" cy="36" r="3" fill="#9AE66E"/></svg></div><div class="label">deploy</div></div>

  <!-- trace -->
  <div class="iccell"><div class="ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none">
    <circle cx="20" cy="20" r="9" stroke="#0E1726" stroke-width="2.4"/>
    <path d="M27 27 l10 10" stroke="#0E1726" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M16 20 h8 M20 16 v8" stroke="#13B5A8" stroke-width="2.4" stroke-linecap="round"/>
  </svg></div><div class="label">trace</div></div>
</div>
<div class="label" style="margin-top:14px;">primitive · expose · store · blob · topic · table · binding · map · diff · pin · mount · schedule · environment · deploy · trace</div>
</div></body></html>
