<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .c { border: 1px solid rgba(167,180,194,0.22); border-radius: 22px; background: rgba(255,255,255,0.84); box-shadow: 0 16px 40px rgba(14,23,38,0.08); padding: 18px 20px; }
  .c h3 { margin: 0 0 6px; font: 600 16px/1.2 'Space Grotesk'; letter-spacing: -0.01em; }
  .c p { margin: 0; font: 400 13px/1.55 'IBM Plex Sans'; color: rgba(14,23,38,0.72); }
  .ckicker { font: 700 10px/1 'IBM Plex Sans'; color: #13B5A8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div class="c"><span class="ckicker">Step 01</span><h3>Declare</h3><p>Constraints in Python — latency, durability, throughput.</p></div>
  <div class="c"><span class="ckicker">Step 02</span><h3>Solve</h3><p>Z3-backed planner scores the catalog.</p></div>
</div>
</div></body></html>
