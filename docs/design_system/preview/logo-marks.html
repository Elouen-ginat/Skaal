<!doctype html>
<html><head><meta charset="utf-8"><title>Logo marks</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;border:1px solid var(--border-2);">
      <img src="../assets/logo_variants/it-dot.svg" style="max-height:56px;" alt="it-dot" />
    </div>
    <div class="label" style="margin-top:8px;">it-dot</div>
  </div>
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;border:1px solid var(--border-2);">
      <img src="../assets/app-icon.svg" style="max-height:64px;" alt="app icon" />
    </div>
    <div class="label" style="margin-top:8px;">app-icon</div>
  </div>
  <div style="text-align:center;">
    <div style="height:96px;display:flex;align-items:center;justify-content:center;background:#0E1726;border-radius:14px;">
      <img src="../assets/favicon.svg" style="max-height:48px;" alt="favicon" />
    </div>
    <div class="label" style="margin-top:8px;">favicon</div>
  </div>
</div>
</div></body></html>
