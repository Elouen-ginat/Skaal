<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap:14px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#13B5A8;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Active / route</div><div class="value">--skaal-color-signal-teal</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#9AE66E;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Resolved / success</div><div class="value">--skaal-color-solver-green</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#5FA8FF;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Info / link</div><div class="value">--skaal-color-cloud-blue</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#C96A3D;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Warning / fallback</div><div class="value">--skaal-color-rust-copper</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#0E1726;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Foreground / text</div><div class="value">--fg-1, --skaal-color-ink</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="width:16px;height:16px;border-radius:50%;background:#A7B4C2;flex-shrink:0;"></span>
      <div><div style="font-family:var(--font-heading);font-weight:600;">Border / divider</div><div class="value">--skaal-color-grid</div></div>
    </div>
  </div>
</div></body></html>
