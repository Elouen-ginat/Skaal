<!doctype html>
<html><head><meta charset="utf-8"><title>Backend card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<style>
  .bcard { border: 1px solid rgba(167,180,194,0.3); border-radius: 16px; background: #fff; padding: 16px 18px; }
  .bcard.selected { border-color: #0E1726; box-shadow: 0 0 0 1px #0E1726 inset; }
  .bhead { display:flex; justify-content:space-between; align-items:center; gap: 10px; }
  .btitle-wrap { display:flex; align-items:center; gap: 10px; min-width: 0; }
  .blogo { width: 28px; height: 28px; border-radius: 8px; background: #F2F4F7; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .btitle { font: 600 16px/1.2 'Space Grotesk'; color: #0E1726; }
  .bcost { font: 600 12px 'IBM Plex Mono'; color: #0F8E84; padding: 4px 8px; background: rgba(19,181,168,0.12); border-radius: 999px; flex-shrink: 0; }
  .bbar { height: 4px; background: #F2F4F7; border-radius: 999px; overflow: hidden; margin-top: 4px; }
  .bbar > i { display:block; height:100%; background: linear-gradient(90deg, #13B5A8, #9AE66E); }
  .brow { display:flex; justify-content:space-between; gap: 8px; font: 500 12px/1.4 'IBM Plex Mono'; color: #6B7785; margin-top: 12px; }
  .brow b { color: #0E1726; font-weight: 600; }
</style>
<div class="bcard selected">
  <div class="bhead">
    <div class="btitle-wrap">
      <span class="blogo" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <ellipse cx="12" cy="6" rx="7" ry="2.5" stroke="#0E1726" stroke-width="1.6"/>
          <path d="M5 6v12c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5V6" stroke="#0E1726" stroke-width="1.6"/>
          <path d="M5 12c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5" stroke="#0E1726" stroke-width="1.6"/>
        </svg>
      </span>
      <div class="btitle">DynamoDB</div>
    </div>
    <div class="bcost">$0.018 / wu · selected</div>
  </div>
  <div class="brow"><span>read_latency</span><b>7ms</b></div>
  <div class="bbar"><i style="width:88%"></i></div>
  <div class="brow"><span>durability</span><b>strong</b></div>
  <div class="bbar"><i style="width:96%"></i></div>
</div>
</div></body></html>
