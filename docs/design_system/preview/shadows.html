<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows & elevation</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#F6FBF9;">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:8px;">
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.22);box-shadow:0 1px 2px rgba(14,23,38,0.04);"></div>
      <div class="label" style="margin-top:14px;">flat</div>
      <div class="value">0 1 2 / 4%</div>
    </div>
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.18);box-shadow:0 4px 12px rgba(14,23,38,0.05);"></div>
      <div class="label" style="margin-top:14px;">soft</div>
      <div class="value">0 4 12 / 5%</div>
    </div>
    <div style="text-align:center;">
      <div style="height:72px;background:#fff;border-radius:14px;border:1px solid rgba(167,180,194,0.14);box-shadow:0 8px 18px rgba(14,23,38,0.06);"></div>
      <div class="label" style="margin-top:14px;">hover</div>
      <div class="value">0 8 18 / 6%</div>
    </div>
  </div>
</div></body></html>
