# Hook versions are kept in sync with the corresponding tools pinned in
# pyproject.toml's [dependency-groups]. When bumping one, bump the other.
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(skaal/deploy/templates/|\.git)'
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
        exclude: '^skaal/deploy/templates/'
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: check-symlinks
      - id: debug-statements
        exclude: '^skaal/deploy/templates/'
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python lint + format (Ruff). Keep in sync with `ruff` in pyproject.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        exclude: '^skaal/deploy/templates/'
      - id: ruff-format
        exclude: '^skaal/deploy/templates/'

  # Type checking (MyPy). Keep `rev` in sync with `mypy` in pyproject typecheck group.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - fsspec>=2025.3.0
          - langgraph>=1.1.10,<2.0
          - tenacity>=9.1.4,<10.0
          - pybreaker>=1.4.1,<2.0
          - redis>=5.0
          - types-redis
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - z3-solver>=4.12
        args: [--ignore-missing-imports]
        exclude: ^(tests/|examples/|skaal/deploy/templates/)

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: '^skaal/deploy/templates/|^artifacts/'

  # Security checks (Bandit). Configured via [tool.bandit] in pyproject.toml.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        additional_dependencies: ['bandit[toml]']
        args: ['-c', 'pyproject.toml', '--severity-level=medium']
        exclude: ^(tests/|skaal/deploy/templates/)

  # GitHub Actions workflow linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes for pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy]  # MyPy can be slow, skip in CI if desired
  submodules: false
