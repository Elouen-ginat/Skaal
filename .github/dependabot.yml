version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      pydantic:
        patterns: ["pydantic*"]
      opentelemetry:
        patterns: ["opentelemetry-*"]
      pulumi:
        patterns: ["pulumi*"]
      google:
        patterns: ["google-*", "gcsfs"]
      aws:
        patterns: ["boto3", "aioboto3", "s3fs"]
      langchain:
        patterns: ["langchain*", "langgraph"]
      dev-tooling:
        patterns: ["ruff", "mypy", "pre-commit", "bandit*", "pip-audit", "pytest*"]

  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  # Rust crate for the PyO3 mesh extension.
  - package-ecosystem: "cargo"
    directory: "/mesh"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]
