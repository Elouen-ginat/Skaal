name: CI

on:
  push:
    branches: [main, ci]
  pull_request:
    branches: [main]

# Restrict the default GITHUB_TOKEN to read-only access on repo contents.
# Every job here only checks out code and uploads artifacts (which uses the
# run-scoped artifact API, not repo permissions).
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify redesign tracker present
        run: test -s notes/redesign-status.md

      - name: Install dev dependencies
        run: uv sync --group dev --extra runtime --extra deploy --extra aws --extra gcp --extra fastapi

      - uses: pre-commit/action@v3.0.1

  pyright:
    # Phase 5b (ADR 033): the strict-typing gate is now blocking. The
    # `ignore` list in `pyrightconfig.json` still excludes 14 modules
    # whose strict-clean sweep depends on third-party stub quality
    # (alembic, fsspec, optional-extras SDKs); the remaining surface is
    # pyright-strict-clean.
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install typecheck dependencies
        run: uv sync --group typecheck --extra runtime --extra deploy --extra aws --extra gcp --extra fastapi

      - name: Run pyright
        run: uv run pyright

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # Smoke-test on Windows + macOS to catch platform-specific regressions
          # without paying the matrix multiplication cost on every Python version.
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --group dev --extra runtime --extra deploy --extra aws --extra gcp --extra fastapi

      - name: Run tests with coverage
        run: >-
          uv run pytest --cov=skaal --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
