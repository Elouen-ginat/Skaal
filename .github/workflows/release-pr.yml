name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  open-pr:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        shell: python
        env:
          BUMP_KIND: ${{ github.event.inputs.bump }}
        run: |
          import os
          import re
          from pathlib import Path

          root = Path.cwd()
          pyproject_path = root / "pyproject.toml"
          pyproject_text = pyproject_path.read_text(encoding="utf-8")
          match = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"$', pyproject_text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not find root package version in pyproject.toml")

          bump_kind = os.environ["BUMP_KIND"]
          major, minor, patch = map(int, match.groups())
          old_version = f"{major}.{minor}.{patch}"
          if bump_kind == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_kind == "minor":
              minor += 1
              patch = 0
          elif bump_kind == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump kind: {bump_kind}")

          new_version = f"{major}.{minor}.{patch}"

          replacements = {
              "pyproject.toml": [
                  (f'version = "{old_version}"', f'version = "{new_version}"'),
              ],
              "skaal/__init__.py": [
                  (f'__version__ = "{old_version}"', f'__version__ = "{new_version}"'),
              ],
              "skaal/cli/templates/init/pyproject.toml.tmpl": [
                  (f'version = "{old_version}"', f'version = "{new_version}"'),
              ],
          }

          changed_files: list[str] = []
          for relative_path, file_replacements in replacements.items():
              path = root / relative_path
              text = path.read_text(encoding="utf-8")
              updated = text
              for old, new in file_replacements:
                  if old not in updated:
                      raise SystemExit(f"Expected string not found in {relative_path}: {old}")
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  changed_files.append(relative_path)

          if not changed_files:
              raise SystemExit("Version bump did not modify any files")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"bump_kind={bump_kind}\n")
              handle.write(f"old_version={old_version}\n")
              handle.write(f"new_version={new_version}\n")
              handle.write(f"tag=v{new_version}\n")
              handle.write(f"branch=release/v{new_version}\n")

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          OLD_VERSION: ${{ steps.bump.outputs.old_version }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          NEW_TAG: ${{ steps.bump.outputs.tag }}
          BUMP_KIND: ${{ steps.bump.outputs.bump_kind }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          git checkout -b "${BRANCH}"
          git add \
            pyproject.toml \
            skaal/__init__.py \
            skaal/cli/templates/init/pyproject.toml.tmpl
          git commit -m "chore(release): bump version to ${NEW_TAG}"
          git push --force-with-lease origin "${BRANCH}"

          cat > /tmp/pr-body.md <<EOF
          Bumps the package version from \`${OLD_VERSION}\` to \`${NEW_VERSION}\` (\`${BUMP_KIND}\` bump).

          Merging this PR to \`main\` will:

          1. Trigger the **Tag release** workflow, which creates the \`${NEW_TAG}\` tag.
          2. Trigger the **Release** workflow on that tag, which builds wheels,
             publishes to PyPI / TestPyPI, and creates a GitHub Release.

          > CI does not run automatically on PRs opened by \`github-actions[bot]\`
          > (a GitHub default-token limitation). Push an empty commit, or close
          > and reopen the PR, to trigger CI.

          ---

          _This PR was opened automatically by the \`Release PR\` workflow._
          EOF

          if gh pr view "${BRANCH}" --json number >/dev/null 2>&1; then
            gh pr edit "${BRANCH}" \
              --title "chore(release): bump version to ${NEW_TAG}" \
              --body-file /tmp/pr-body.md
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(release): bump version to ${NEW_TAG}" \
              --body-file /tmp/pr-body.md
          fi
