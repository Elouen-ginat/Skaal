name: Infra Diff

on:
  pull_request:
    branches: [main]

concurrency:
  group: infra-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  infra-diff:
    name: Render infra diff comment
    runs-on: ubuntu-latest
    env:
      SKAAL_PLAN_TARGET: ${{ vars.SKAAL_PLAN_TARGET }}
      SKAAL_PLAN_ENV: ${{ vars.SKAAL_PLAN_ENV }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --group dev --extra runtime --extra deploy --extra aws --extra fastapi

      - name: Resolve Skaal app target
        id: resolve-target
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          target = os.environ.get("SKAAL_PLAN_TARGET", "").strip()
          env_name = os.environ.get("SKAAL_PLAN_ENV", "").strip() or "prod"
          if not target:
              pyproject = Path("pyproject.toml")
              if pyproject.exists():
                  with pyproject.open("rb") as fh:
                      data = tomllib.load(fh)
                  target = str(data.get("tool", {}).get("skaal", {}).get("app", "")).strip()

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              print(f"target={target}", file=fh)
              print(f"env_name={env_name}", file=fh)
          PY

      - name: Render markdown comment body
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TARGET: ${{ steps.resolve-target.outputs.target }}
          ENV_NAME: ${{ steps.resolve-target.outputs.env_name }}
        run: |
          if [ -z "$TARGET" ]; then
          python - <<'PY'
          from pathlib import Path

          Path("/tmp/skaal-infra-diff.md").write_text(
              "## Skaal infra diff\n\n"
              "No infra diff was generated because no Skaal app target is configured.\n"
              "Set the `SKAAL_PLAN_TARGET` repository variable or `[tool.skaal].app`\n"
              "in `pyproject.toml` to enable PR infra comments.\n",
              encoding="utf-8",
          )
          PY
            exit 0
          fi

          base_dir="$(mktemp -d /tmp/skaal-base-XXXXXX)"
          cleanup() {
            git worktree remove --force "$base_dir"
          }
          trap cleanup EXIT

          git worktree add --detach "$base_dir" "$BASE_SHA"

          export BASE_DIR="$base_dir"
          export HEAD_DIR="$GITHUB_WORKSPACE"
          uv run python - <<'PY'
          from __future__ import annotations

          import os
          import subprocess
          import sys
          import textwrap
          from pathlib import Path

          from skaal.api import diff_bound_plans, render_plan_diff_markdown
          from skaal.binding.model import Plan

          TARGET = os.environ["TARGET"]
          ENV_NAME = os.environ["ENV_NAME"]
          BASE_DIR = Path(os.environ["BASE_DIR"])
          HEAD_DIR = Path(os.environ["HEAD_DIR"])
          BASE_SHA = os.environ["BASE_SHA"]
          HEAD_SHA = os.environ["HEAD_SHA"]

          SNAPSHOT = textwrap.dedent(
              """
              from pathlib import Path
              import os

              from skaal.cli._load import load_app, load_plan

              target = os.environ["SKAAL_PLAN_TARGET"]
              env_name = os.environ["SKAAL_PLAN_ENV"]
              out_path = Path(os.environ["SKAAL_PLAN_OUT"])

              app = load_app(target)
              bound = load_plan(app, env_name).bound
              out_path.write_text(bound.model_dump_json(), encoding="utf-8")
              """
          )

          def snapshot(root: Path, out_path: Path) -> None:
              env = os.environ.copy()
              env["PYTHONPATH"] = str(root)
              env["SKAAL_PLAN_TARGET"] = TARGET
              env["SKAAL_PLAN_ENV"] = ENV_NAME
              env["SKAAL_PLAN_OUT"] = str(out_path)
              subprocess.run(
                  [sys.executable, "-c", SNAPSHOT],
                  cwd=root,
                  env=env,
                  check=True,
              )

          base_json = Path("/tmp/skaal-base-plan.json")
          head_json = Path("/tmp/skaal-head-plan.json")
          snapshot(BASE_DIR, base_json)
          snapshot(HEAD_DIR, head_json)

          base_plan = Plan.model_validate_json(base_json.read_text(encoding="utf-8"))
          head_plan = Plan.model_validate_json(head_json.read_text(encoding="utf-8"))
          diff = diff_bound_plans(head_plan, base_plan)
          body = render_plan_diff_markdown(diff, compared_label="base")

          comment = (
              "## Skaal infra diff\n\n"
              f"- target: `{TARGET}`\n"
              f"- env: `{ENV_NAME}`\n"
              f"- base: `{BASE_SHA[:7]}`\n"
              f"- head: `{HEAD_SHA[:7]}`\n\n"
              f"{body}"
          )
          Path("/tmp/skaal-infra-diff.md").write_text(comment, encoding="utf-8")
          PY

      - name: Create or update sticky PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          uv run python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          from pathlib import Path
          from urllib import error, request

          marker = "<!-- skaal-plan-diff -->"
          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          if re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", repo) is None:
              raise ValueError(f"Unexpected repository value: {repo!r}")
          issue_number = int(pr_number)
          api_base = f"https://api.github.com/repos/{repo}"
          body = marker + "\n" + Path("/tmp/skaal-infra-diff.md").read_text(encoding="utf-8")
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def api(method: str, url: str, payload: dict[str, object] | None = None) -> object:
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = request.Request(url, data=data, headers=headers, method=method)
              with request.urlopen(req) as resp:  # noqa: S310
                  return json.load(resp)

          comments = api(
              "GET",
              f"{api_base}/issues/{issue_number}/comments?per_page=100",
          )
          existing = next(
              (
                  comment
                  for comment in comments
                  if isinstance(comment, dict) and marker in str(comment.get("body", ""))
              ),
              None,
          )
          try:
              if isinstance(existing, dict):
                  api(
                      "PATCH",
                      f"{api_base}/issues/comments/{existing['id']}",
                      {"body": body},
                  )
              else:
                  api(
                      "POST",
                      f"{api_base}/issues/{issue_number}/comments",
                      {"body": body},
                  )
          except error.HTTPError as exc:
              if exc.code == 403:
                  print("Skipping sticky comment update: token lacks comment permissions.")
              else:
                  raise
          PY
